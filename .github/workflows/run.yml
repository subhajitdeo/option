name: Run Option Chain Engine

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write   # 🔥 THIS IS THE WRITE PERMISSION

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run engine
        run: python src/engine.py

      - name: Commit output back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add output/result.json
          git commit -m "auto update result" || echo "no changes"
          git push
